name: Build, Scan & Deploy to AWS ECS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: ecommerce-api
  ECS_CLUSTER: ecommerce-cluster
  ECS_SERVICE: ecommerce-api-service
  CONTAINER_NAME: ecommerce-api
  JAVA_VERSION: '17'

jobs:
  # ============================================================
  # Job 1: Build & Test
  # ============================================================
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Run unit & integration tests
        run: mvn -B test

      - name: Build JAR artifact
        run: mvn -B package -DskipTests

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 7

  # ============================================================
  # Job 2: SAST — Static Application Security Testing
  # ============================================================
  sast:
    name: SAST Scan (Semgrep)
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep SAST scan
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/java
            p/owasp-top-ten
            p/spring
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

  # ============================================================
  # Job 3: Dependency Vulnerability Scan
  # ============================================================
  dependency-scan:
    name: Dependency Scan (OWASP Dependency-Check)
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Run OWASP Dependency-Check
        run: |
          mvn org.owasp:dependency-check-maven:check \
            -DfailBuildOnCVSS=8 \
            -DsuppressionFile=.dependency-check-suppressions.xml \
            --no-transfer-progress || true

      - name: Upload Dependency-Check report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-check-report
          path: target/dependency-check-report.html

  # ============================================================
  # Job 4: Container Build & Push to ECR
  # Only runs on pushes to main (not PRs)
  # ============================================================
  push-to-ecr:
    name: Build & Push Container Image
    runs-on: ubuntu-latest
    needs: [build-and-test, sast]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      image-tag: ${{ steps.meta.outputs.image-tag }}
      full-image: ${{ steps.meta.outputs.full-image }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC recommended — replace with role-to-assume for keyless auth)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image metadata
        id: meta
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          IMAGE_TAG="${GITHUB_SHA::8}"
          FULL_IMAGE="${REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          echo "image-tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "full-image=${FULL_IMAGE}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        env:
          FULL_IMAGE: ${{ steps.meta.outputs.full-image }}
        run: |
          docker build -t "$FULL_IMAGE" .
          docker push "$FULL_IMAGE"
          echo "Pushed image: $FULL_IMAGE"

      - name: Check ECR image scan findings
        env:
          IMAGE_TAG: ${{ steps.meta.outputs.image-tag }}
        run: |
          echo "Waiting 30s for ECR scan to complete..."
          sleep 30
          aws ecr describe-image-scan-findings \
            --repository-name $ECR_REPOSITORY \
            --image-id imageTag=$IMAGE_TAG \
            --region $AWS_REGION \
            --query 'imageScanFindings.findingSeverityCounts' \
            --output json || true

  # ============================================================
  # Job 5: Deploy to ECS Fargate
  # ============================================================
  deploy:
    name: Deploy to ECS Fargate (Production)
    runs-on: ubuntu-latest
    needs: push-to-ecr
    environment:
      name: production
      url: https://api.yourdomain.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download current ECS task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ecommerce-api \
            --query taskDefinition \
            --output json > task-definition.json

      - name: Render updated task definition with new image
        id: render-td
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ needs.push-to-ecr.outputs.full-image }}

      - name: Deploy to ECS (rolling update, wait for stability)
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.render-td.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Verify deployment health
        run: |
          sleep 15
          HTTP_CODE=$(curl -o /dev/null -s -w "%{http_code}" \
            https://api.yourdomain.com/actuator/health)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Health check failed with HTTP $HTTP_CODE"
            exit 1
          fi
          echo "Deployment verified. Health check returned HTTP $HTTP_CODE"

  # ============================================================
  # Job 6: DAST — Dynamic Application Security Testing
  # Runs after successful deployment against the live environment
  # ============================================================
  dast:
    name: DAST Scan (OWASP ZAP)
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run OWASP ZAP API Scan
        uses: zaproxy/action-api-scan@v0.7.0
        with:
          target: 'https://api.yourdomain.com'
          format: openapi
          cmd_options: '-a'
          # Change to true to fail the pipeline on HIGH-severity findings
          fail_action: false

      - name: Upload ZAP HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-dast-report
          path: report_html.html
          retention-days: 30
