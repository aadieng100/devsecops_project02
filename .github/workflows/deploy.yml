name: "DevSecOps Project 02: High-Availability GitOps Pipeline"

on:
  pull_request:
    branches: [ "main" ]
    paths:
      - "src/**"
      - "pom.xml"
      - "terraform/infra-network/**"
  push:
    branches: [ "main" ]
    paths:
      - "src/**"
      - "pom.xml"
      - "terraform/infra-network/**"

permissions:
  id-token: write   # Mandatory requirement for AWS OIDC Token Federation
  contents: read    # Necessary to checkout repository code
  issues: write     # Allows OWASP ZAP to dynamically create compliance tracking tickets

jobs:
  # ==============================================================================
  # TRACK A: PULL REQUEST VALIDATION & EPHEMERAL DAST RUNS
  # ==============================================================================
  pr-security-gate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Initialize Java Enterprise Tooling
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      # 1. Shift-Left Security: Infrastructure-as-Code (IaC) Scanning via Checkov
      - name: Run Checkov IaC Security Sweep
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/infra-network
          framework: terraform
          soft_fail: true # Flags vulnerabilities clearly without stopping the build layout prematurely

      # 2. Keyless Authentication via AWS OIDC Federated Token Exchange
      - name: Authenticate to AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: "arn:aws:iam::554000694003:role/devsecops-p02-github-actions-role" # Paste your saved github_actions_role_arn here
          aws-region: "eu-west-3"
          audience: "sts.amazonaws.com"

      # 3. Code Validation Pass
      - name: Execute Spring Boot Application Compilation & Tests
        run: mvn clean verify -DskipTests=false

      # 4. Ephemeral Infrastructure Staging Verification
      - name: Setup Terraform Execution Engine
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.6"

      - name: Verify Staging Environmental Alignment
        run: |
          cd terraform/infra-network
          terraform init -reconfigure
          terraform validate
          terraform plan -out=staging-ephemeral.tfplan

      # 5. Dynamic Application Security Testing (DAST) Mock Pipeline Trigger
      # In a real pipeline, we 'terraform apply' here, run the scan, then 'terraform destroy'.
      # For your portfolio review, we run OWASP ZAP in baseline tracking mode against our public ALB.
      - name: Execute OWASP ZAP Target Assessment
        uses: zaproxy/action-baseline@v0.12.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target: "http://devsecops-p02-alb-1601639014.eu-west-3.elb.amazonaws.com" # Replace with your saved alb_dns_name
          rules_file_name: ".zap/rules.tsv"
          fail_action: false
          issue_title: "Security Regression Vulnerability Found by OWASP ZAP DAST"

  # ==============================================================================
  # TRACK B: PERSISTENT PRODUCTION STREAM VIA CONTINUOUS DEPLOYMENT
  # ==============================================================================
  production-deployment:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Authenticate to AWS via Production OIDC Link
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: "arn:aws:iam::554000694003:role/devsecops-p02-github-actions-role"
          aws-region: "eu-west-3"
          audience: "sts.amazonaws.com"

      - name: Setup Production Infrastructure Deployment
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.6"

      - name: Deploy Core High-Availability Architecture to Production Stream
        run: |
          cd terraform/infra-network
          terraform init -reconfigure
          terraform plan -out=prod-release.tfplan
          terraform apply -auto-approve prod-release.tfplan
