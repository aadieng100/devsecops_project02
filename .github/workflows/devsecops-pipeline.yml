name: "DevSecOps: Ephemeral Security Validation Engine"

on:
  pull_request:
    branches: [ "main" ]
    paths:
      - "src/**"
      - "pom.xml"
      - "terraform/infra-network/**"
      - ".github/workflows/**"
      - ".semgrepignore"
      - ".zap/**"
      - "Dockerfile"

permissions:
  id-token: write   # Mandatory for keyless AWS OIDC Federation
  contents: read    # Required to check out code
  issues: write     # Allows OWASP ZAP to post security tickets directly to your PR

jobs:
  # ==============================================================================
  # THE SINGLE DEFINITIVE EPHEMERAL VALIDATION GATE
  # ==============================================================================
  ephemeral-validation-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1. SECRET SCANNING: Deep commit history credential audits
      - name: Run Trufflehog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --debug --only-verified
        continue-on-error: false

      # 2. SAST: Semgrep semantic analysis (Java standard + OWASP Top 10 rules)
      - name: Run Semgrep Static Application Security Testing
        run: |
          docker run --rm -v "${{ github.workspace }}:/src" returntocorp/semgrep semgrep scan \
            --config=p/java --config=p/owasp-top-ten
        continue-on-error: true

      # 3. COMPILATION LAYER
      - name: Initialize Java Enterprise Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Execute Spring Boot Code Compilation
        run: mvn clean package -DskipTests=true

      # 4. SCA: Trivy file system dependency vulnerability scans
      - name: Run Trivy Software Composition Analysis (SCA)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          vuln-type: 'library'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      # 5. CONTAINER SCANNING: Verify built Docker layer compliance
      - name: Build Application Container Image
        run: docker build -t devsecops-p02-app:${{ github.sha }} .

      - name: Run Trivy Container Image Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'devsecops-p02-app:${{ github.sha }}'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      # 6. IaC ASSESSMENT: Checkov configuration scans
      - name: Run Checkov IaC Security Verification
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/infra-network
          framework: terraform
          soft_fail: true

      # 7. AWS KEYLESS OIDC AUTHENTICATION EXCHANGE
      - name: Authenticate to AWS via OIDC Identity Provider
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: "arn:aws:iam::554000694003:role/devsecops-p02-github-actions-role"
          aws-region: "eu-west-3"
          audience: "sts.amazonaws.com"

      # 8. EPHEMERAL INFRASTRUCTURE DEPLOYMENT
      - name: Initialize Terraform Runtime
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.6"

      - name: Spin Up Temporary Validation Environment
        id: infra_deploy
        run: |
          cd terraform/infra-network
          terraform init -reconfigure -backend-config="key=ephemeral/terraform.tfstate"
          terraform apply -auto-approve -var="db_username=postgres"

          LIVE_ALB_DNS=$(terraform output -raw alb_dns_name)
          echo "dynamic_url=http://$LIVE_ALB_DNS" >> $GITHUB_OUTPUT

      # 9. DAST RESOLUTION PRE-REQUISITES
      - name: Remediate Workspace Permissions for Non-Root Docker Runners
        run: sudo chmod -R 777 ${{ github.workspace }}

      # 10. DAST: Active OWASP ZAP penetration fuzzing against the ephemeral ALB URL
      - name: Execute Active OWASP ZAP Penetration Assessment
        uses: zaproxy/action-baseline@v0.12.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target: ${{ steps.infra_deploy.outputs.dynamic_url }}
          rules_file_name: ".zap/rules.tsv"
          fail_action: false
          issue_title: "Security Regression Vulnerability Flagged by OWASP ZAP DAST"

      # 11. AUTOMATED CLEANUP: Enforce destruction regardless of previous job outcomes
      - name: Enforce Ephemeral Infrastructure Destruction
        if: always()
        run: |
          cd terraform/infra-network
          terraform init -reconfigure -backend-config="key=ephemeral/terraform.tfstate"
          terraform destroy -auto-approve -var="db_username=postgres"
