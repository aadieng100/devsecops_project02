# .github/workflows/devsecops-pipeline.yml
name: "DevSecOps Project 02: End-to-End Advanced Security Pipeline"

on:
  pull_request:
    branches: [ "main" ]
    paths:
      - "src/**"
      - "pom.xml"
      - "terraform/infra-network/**"
      - ".github/workflows/**"
      - ".semgrepignore"
      - ".zap/**"
  push:
    branches: [ "main" ]
    paths:
      - "src/**"
      - "pom.xml"
      - "terraform/infra-network/**"
      - ".github/workflows/**"
      - ".semgrepignore"
      - ".zap/**"

permissions:
  id-token: write   # Mandatory for keyless AWS OIDC Federation
  contents: read    # Required to check out code
  issues: write     # Allows OWASP ZAP to post security tickets directly to your PR

jobs:
  # ==============================================================================
  # TRACK A: PULL REQUEST HARDENING (SAST, SCA, CONTAINER, EPHEMERAL STAGING DAST)
  # ==============================================================================
  secure-validation-gate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1. SECRET SCANNING: Trufflehog Git History Audit
      - name: Run Trufflehog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --debug --only-verified
        continue-on-error: false

      # 2. SAST: Semgrep Open-Source Static Code Analysis
      - name: Run Semgrep Static Application Security Testing
        run: |
          docker run --rm -v "${{ github.workspace }}:/src" returntocorp/semgrep semgrep scan \
            --config=p/java --config=p/owasp-top-ten
        continue-on-error: true

      # 3. COMPILATION & CACHE POPULATION LAYER
      # Running this here ensures all Maven artifacts are cached on disk before Trivy runs.
      - name: Initialize Java Enterprise Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Execute Spring Boot Code Compilation & Cache Population
        run: mvn clean package -DskipTests=true

      # 4. SCA: Trivy Filesystem Dependency Scan (Now reads cleanly from local Maven cache)
      - name: Run Trivy Software Composition Analysis (SCA)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          vuln-type: 'library'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      # 5. CONTAINER SCANNING: Build and Verify Local Docker Layer Compliance
      - name: Build Application Container Image
        run: docker build -t devsecops-p02-app:${{ github.sha }} .

      - name: Run Trivy Container Image Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'devsecops-p02-app:${{ github.sha }}'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      # 6. INFRASTRUCTURE-AS-CODE (IaC) ASSESSMENT: Checkov Sweep
      - name: Run Checkov IaC Security Verification
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/infra-network
          framework: terraform
          soft_fail: true

      # 7. AWS KEYLESS OIDC AUTHENTICATION EXCHANGE
      - name: Authenticate to AWS via OIDC Identity Provider
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: "arn:aws:iam::554000694003:role/devsecops-p02-github-actions-role"
          aws-region: "eu-west-3"
          audience: "sts.amazonaws.com"

      # 8. EPHEMERAL STAGING INFRASTRUCTURE DEPLOYMENT
      - name: Initialize Terraform Runtime
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.6"

      - name: Spin Up Identical Ephemeral Staging Mirror
        run: |
          cd terraform/infra-network
          terraform init -reconfigure
          terraform apply -auto-approve -var="db_username=postgres"

      # 9. DAST: Active OWASP ZAP Ingress Penetration Fuzzing
      - name: Execute Active OWASP ZAP Penetration Assessment
        uses: zaproxy/action-baseline@v0.12.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target: "http://devsecops-p02-alb-1601639014.eu-west-3.elb.amazonaws.com"
          rules_file_name: ".zap/rules.tsv"
          fail_action: false
          issue_title: "Security Regression Vulnerability Flagged by OWASP ZAP DAST"

      # 10. CRITICAL DEVSECOPS SAFEGUARD: Guaranteed Cost-Free Infrastructure Teardown
      - name: Enforce Ephemeral Infrastructure Destruction
        if: always()
        run: |
          cd terraform/infra-network
          terraform init -reconfigure
          terraform destroy -auto-approve -var="db_username=postgres"

  # ==============================================================================
  # TRACK B: CONTINUOUS PRODUCTION STREAM (Triggers strictly upon successful merge)
  # ==============================================================================
  production-release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Authenticate to AWS via Production OIDC Link
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: "arn:aws:iam::554000694003:role/devsecops-p02-github-actions-role"
          aws-region: "eu-west-3"
          audience: "sts.amazonaws.com"

      - name: Setup Production Infrastructure Deployment
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.6"

      - name: Update Persistent Production Environment
        run: |
          cd terraform/infra-network
          terraform init -reconfigure
          terraform plan -out=prod-release.tfplan
          terraform apply -auto-approve prod-release.tfplan
