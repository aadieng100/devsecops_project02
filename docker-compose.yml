version: '3.9'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecommerce_api
    environment:
      # These variables will be dynamically injected via the local .env file on boot
      DB_URL: jdbc:postgresql://${RDS_ENDPOINT}:5432/ecommerce_db
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    restart: unless-stopped
