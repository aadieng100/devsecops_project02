# Spring Boot application properties - production-ready PostgreSQL configuration

spring.application.name=headless-ecommerce-api

# ============================================================
# DataSource Configuration (PostgreSQL)
# ============================================================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/ecommerce_db}
spring.datasource.username=${DB_USERNAME:ecommerce_user}
spring.datasource.password=${DB_PASSWORD:ecommerce_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Connection Pool (production-grade settings)
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.pool-name=EcommerceHikariPool
spring.datasource.hikari.connection-test-query=SELECT 1

# ============================================================
# JPA / Hibernate Configuration
# ============================================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.default_schema=public
spring.jpa.open-in-view=false

# ============================================================
# Server Configuration
# ============================================================
server.port=${SERVER_PORT:8080}
server.error.whitelabel.enabled=false

# ============================================================
# Actuator
# ============================================================
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when-authorized

# ============================================================
# Logging
# ============================================================
logging.level.root=INFO
logging.level.com.ecommerce=DEBUG
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.web=INFO

# ==============================================================================
# SECURITY HARDENING: Explicitly strip framework signatures from error payloads
# ==============================================================================
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.include-exception=false
